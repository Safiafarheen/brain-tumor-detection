<!DOCTYPE html>
<html>
<head>
    <title>Brain Tumor Detection</title>
    <style>
        body { text-align: center; padding: 50px; font-family: Arial; background: #f0f8ff; }
        h1 { color: #2c5282; margin-bottom: 30px; }
        .upload-box { 
            border: 3px dashed #4299e1; 
            padding: 50px; 
            margin: 20px auto; 
            max-width: 500px; 
            cursor: pointer;
            border-radius: 10px;
        }
        .upload-box:hover { background: #ebf8ff; }
        input[type=file] { display: none; }
        button { 
            padding: 15px 30px; 
            font-size: 18px; 
            background: #48bb78; 
            color: white; 
            border: none; 
            border-radius: 25px; 
            cursor: pointer; 
            margin: 20px;
            font-weight: bold;
        }
        button:disabled { background: #a0aec0; cursor: not-allowed; }
        #preview { max-width: 300px; max-height: 300px; margin: 20px; border-radius: 10px; display: none; }
        #result { 
            margin: 30px; 
            font-size: 28px; 
            font-weight: bold; 
            padding: 20px; 
            border-radius: 10px;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <h1>🧠 AI Brain Tumor Detection System</h1>
    
    <!-- CLICKABLE UPLOAD AREA -->
    <div class="upload-box" onclick="document.getElementById('fileInput').click()">
        <p style="font-size: 20px; color: #2b6cb0;">📁 Upload MRI Scan (JPG/PNG)</p>
        <p style="color: #718096;">Click here or drag & drop image</p>
    </div>
    
    <!-- FILE INPUT (HIDDEN) -->
    <input type="file" id="fileInput" name="file" accept="image/*">
    
    <!-- IMAGE PREVIEW -->
    <img id="preview">
    
    <!-- ANALYZE BUTTON -->
    <button id="analyzeBtn" onclick="analyzeScan()" disabled>🔬 ANALYZE SCAN</button>
    
    <!-- RESULT DISPLAY -->
    <div id="result">Upload an MRI scan and click ANALYZE</div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const preview = document.getElementById('preview');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const resultDiv = document.getElementById('result');

        // When file selected → Show preview
        fileInput.onchange = function() {
            const file = this.files[0];
            if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    analyzeBtn.disabled = false;
                    analyzeBtn.innerHTML = '🔬 ANALYZE SCAN';
                };
                reader.readAsDataURL(file);
            } else {
                alert('Please select JPG or PNG image!');
                this.value = '';
            }
        };

        // Analyze button clicked
        async function analyzeScan() {
            const file = fileInput.files[0];
            if (!file) return;

            // Show loading
            resultDiv.innerHTML = '🔄 Analyzing MRI Scan...';
            analyzeBtn.disabled = true;
            analyzeBtn.innerHTML = '⏳ Processing...';

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                if (data.status === 'success') {
                    resultDiv.innerHTML = `✅ <strong>${data.result}</strong><br>
                        Confidence: <strong style="color: #48bb78;">${data.confidence}</strong>`;
                    resultDiv.style.background = '#d4f4dd';
                    resultDiv.style.color = '#065f46';
                    resultDiv.style.border = '2px solid #4ade80';
                } else {
                    resultDiv.innerHTML = `❌ Error: ${data.error}`;
                    resultDiv.style.background = '#fee2e2';
                    resultDiv.style.color = '#991b1b';
                }
            } catch (error) {
                resultDiv.innerHTML = '❌ Network error - Try again';
                resultDiv.style.background = '#fee2e2';
                resultDiv.style.color = '#991b1b';
                console.error('Error:', error);
            }

            analyzeBtn.disabled = false;
            analyzeBtn.innerHTML = '🔬 ANALYZE SCAN';
        }
    </script>
</body>
</html>
