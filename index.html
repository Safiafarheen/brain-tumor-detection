<!DOCTYPE html>
<html>
<head>
    <title>Brain Tumor Detection</title>
    <style>
        body { font-family: Arial; max-width: 800px; margin: 50px auto; text-align: center; }
        .upload-area { border: 3px dashed #007bff; padding: 50px; margin: 20px; border-radius: 10px; }
        .upload-area.dragover { background: #e3f2fd; }
        #preview { max-width: 300px; max-height: 300px; margin: 20px; }
        button { background: #007bff; color: white; padding: 15px 30px; border: none; border-radius: 5px; font-size: 18px; cursor: pointer; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .result { font-size: 24px; margin: 20px; padding: 20px; border-radius: 10px; }
        .tumor { background: #ff4444; color: white; }
        .no-tumor { background: #44ff44; color: black; }
    </style>
</head>
<body>
    <h1>🧠 Brain Tumor Detection</h1>
    <p>Upload MRI scan for instant AI analysis</p>
    
    <div class="upload-area" id="uploadArea">
        <p>📁 Click or drag MRI image here</p>
        <input type="file" id="imageInput" accept="image/*" style="display: none;">
    </div>
    
    <img id="preview" style="display: none;">
    <br>
    <button id="predictBtn" disabled>Predict Tumor</button>
    
    <div id="result" class="result" style="display: none;"></div>

    <script>
        // SAFEGUARD: Check if elements exist
        const uploadArea = document.getElementById('uploadArea');
        const imageInput = document.getElementById('imageInput');
        const preview = document.getElementById('preview');
        const predictBtn = document.getElementById('predictBtn');
        const result = document.getElementById('result');

        if (!uploadArea || !imageInput || !preview || !predictBtn || !result) {
            console.error('❌ Missing HTML elements');
            document.body.innerHTML = '<h1>Frontend Error - Please refresh</h1>';
            throw new Error('Missing elements');
        }

        // Upload handling
        uploadArea.addEventListener('click', () => imageInput.click());
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) handleImage(files[0]);
        });

        imageInput.addEventListener('change', (e) => {
            if (e.target.files && e.target.files[0]) {
                handleImage(e.target.files[0]);
            }
        });

        function handleImage(file) {
            if (!file.type.startsWith('image/')) {
                alert('Please upload an image file');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = (e) => {
                preview.src = e.target.result;
                preview.style.display = 'block';
                predictBtn.disabled = false;
            };
            reader.readAsDataURL(file);
        }

        predictBtn.addEventListener('click', async () => {
            try {
                predictBtn.disabled = true;
                predictBtn.textContent = 'Analyzing...';
                result.style.display = 'none';

                const formData = new FormData();
                formData.append('file', imageInput.files[0]);

                const response = await fetch('/predict', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();
                
                result.innerHTML = `
                    <h2>${data.result || 'Error'}</h2>
                    <p>Confidence: ${data.confidence || 'N/A'}</p>
                    ${data.analysis ? `<p>${data.analysis}</p>` : ''}
                `;
                
                result.className = 'result ' + (data.result === 'TUMOR' ? 'tumor' : 'no-tumor');
                result.style.display = 'block';
                
            } catch (error) {
                console.error('Predict error:', error);
                result.innerHTML = `<p style="color: red;">Network Error: ${error.message}</p>`;
                result.style.display = 'block';
            } finally {
                predictBtn.disabled = false;
                predictBtn.textContent = 'Predict Tumor';
            }
        });
    </script>
</body>
</html>
